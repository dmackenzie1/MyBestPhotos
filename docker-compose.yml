services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mybestphotos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photo_curator}
      POSTGRES_USER: ${POSTGRES_USER:-photo_curator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photo_curator}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/postgres/init/001_stock_schema.sql:/docker-entrypoint-initdb.d/001_stock_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photo_curator} -d ${POSTGRES_DB:-photo_curator}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app-server:
    build:
      context: .
      dockerfile: services/app/server/Dockerfile
    container_name: mybestphotos-app-server
    command: ["node", "dist/services/app/server/src/index.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-photo_curator}:${POSTGRES_PASSWORD:-photo_curator}@postgres:5432/${POSTGRES_DB:-photo_curator}
      THUMBS_DIR: /data/cache/thumbs
      PORT: 3001
      STUB_MODE: ${STUB_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrations:
        condition: service_completed_successfully
    volumes:
      - ${PHOTO_INGEST_ROOT:-./sample-photos}:/photos/library:ro
      - ./data/cache/thumbs:/data/cache/thumbs:ro
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app-client:
    build:
      context: .
      dockerfile: services/app/client/Dockerfile
    container_name: mybestphotos-app-client
    depends_on:
      app-server:
        condition: service_healthy
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:4173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
    container_name: mybestphotos-nginx
    ports:
      - "8080:80"
    depends_on:
      app-client:
        condition: service_healthy
      app-server:
        condition: service_healthy

  python-runner:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm
    container_name: mybestphotos-python-runner
    working_dir: /workspace
    environment:
      PHOTO_CURATOR_DB_DSN: postgresql://${POSTGRES_USER:-photo_curator}:${POSTGRES_PASSWORD:-photo_curator}@postgres:5432/${POSTGRES_DB:-photo_curator}
      PHOTO_CURATOR_DEFAULT_ROOTS: /photos/library
      PHOTO_CURATOR_CACHE_DIR: /data/cache
      PHOTO_CURATOR_THUMBS_DIR: /data/cache/thumbs
      PHOTO_CURATOR_DESCRIPTION_PROVIDER: ${PHOTO_CURATOR_DESCRIPTION_PROVIDER:-basic}
      PHOTO_CURATOR_LMSTUDIO_BASE_URL: ${PHOTO_CURATOR_LMSTUDIO_BASE_URL:-http://192.168.10.64:1234/v1}
      PHOTO_CURATOR_LMSTUDIO_MODEL: ${PHOTO_CURATOR_LMSTUDIO_MODEL:-qwen3.6-35b-a3b}
      PHOTO_CURATOR_LMSTUDIO_TIMEOUT_SECONDS: ${PHOTO_CURATOR_LMSTUDIO_TIMEOUT_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrations:
        condition: service_completed_successfully
      app-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace
      - ${PHOTO_INGEST_ROOT:-./sample-photos}:/photos/library:ro
      - ./data/cache:/data/cache
      - uv-cache:/root/.cache/uv
    command: >
      sh -lc "uv sync --project . &&
              uv run --project . photo-curator pipeline"

  postgres-migrations:
    image: pgvector/pgvector:pg16
    container_name: mybestphotos-postgres-migrations
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photo_curator}
      POSTGRES_USER: ${POSTGRES_USER:-photo_curator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photo_curator}
      PGPASSWORD: ${POSTGRES_PASSWORD:-photo_curator}
      PGHOST: postgres
      PGPORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/postgres:/migrations:ro
    command: ["bash", "/migrations/apply-migrations.sh"]
    restart: "no"

volumes:
  pgdata:
  uv-cache:
